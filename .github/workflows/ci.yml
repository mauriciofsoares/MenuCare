name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.classify.outputs.docs-only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true)"
          fi

          if [[ -z "${changed_files}" ]]; then
            echo "docs-only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true

          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue

            case "${file}" in
              docs/*|*.md|README|README.*)
                ;;
              *)
                docs_only=false
                break
                ;;
            esac
          done <<< "${changed_files}"

          echo "docs-only=${docs_only}" >> "$GITHUB_OUTPUT"

  docs-validation:
    needs: classify-changes
    if: needs.classify-changes.outputs.docs-only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Validate docs-only change
        run: echo "Docs-only change detected. Skipping dependency install, tests, build, and database services."

  validate:
    needs: classify-changes
    if: needs.classify-changes.outputs.docs-only != 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: menucare_test
          POSTGRES_USER: menucare
          POSTGRES_PASSWORD: menucare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U menucare -d menucare_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: postgresql://menucare:menucare@localhost:5432/menucare_test?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace apps/api

      - name: Prepare test database
        run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma

      - name: Run tests (API + Web)
        run: npm run test:all

      - name: Build (API + Web)
        run: npm run build:all
