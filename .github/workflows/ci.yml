name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: postgresql://menucare:menucare@localhost:5432/menucare_test

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | sed '/^$/d' > changed-files.txt

          docs_only=true
          if [ ! -s changed-files.txt ]; then
            docs_only=false
          else
            while IFS= read -r file; do
              case "$file" in
                docs/*|*.md|README|README.*)
                  ;;
                *)
                  docs_only=false
                  ;;
              esac
            done < changed-files.txt
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          cat changed-files.txt

      - name: Lightweight docs validation
        if: steps.changes.outputs.docs_only == 'true'
        run: |
          echo "Documentation-only change detected."
          echo "Skipping tests and build that require application/runtime dependencies."

      - name: Setup Node.js
        if: steps.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Start PostgreSQL
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          docker run \
            --detach \
            --name menucare-postgres \
            --env POSTGRES_USER=menucare \
            --env POSTGRES_PASSWORD=menucare \
            --env POSTGRES_DB=menucare_test \
            --publish 5432:5432 \
            postgres:16

          for attempt in {1..30}; do
            if docker exec menucare-postgres pg_isready -U menucare -d menucare_test; then
              exit 0
            fi
            sleep 2
          done

          docker logs menucare-postgres
          exit 1

      - name: Install dependencies
        if: steps.changes.outputs.docs_only != 'true'
        run: npm ci

      - name: Prepare test database
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          npx prisma db execute --schema apps/api/prisma/schema.prisma --file apps/api/prisma/migrations/baseline/migration.sql
          npx prisma db execute --schema apps/api/prisma/schema.prisma --file apps/api/prisma/migrations/20260611_sprint_p_contracts_status/migration.sql
          npx prisma db execute --schema apps/api/prisma/schema.prisma --file apps/api/prisma/migrations/20260611_sprint_p_source_excerpt/migration.sql
          npx prisma db execute --schema apps/api/prisma/schema.prisma --file apps/api/prisma/migrations/20260611_sprint_p_evidence_metadata/migration.sql
          npx prisma db execute --schema apps/api/prisma/schema.prisma --file apps/api/prisma/migrations/20260611_sprint_p_compliance_controls/migration.sql
          npx prisma db execute --schema apps/api/prisma/schema.prisma --file apps/api/prisma/migrations/20260611_sprint_q_control_state_machine_and_finding_events/migration.sql
          npx prisma db execute --schema apps/api/prisma/schema.prisma --file apps/api/prisma/migrations/20260611_sprint_q_operational_governance/migration.sql
          npx prisma db execute --schema apps/api/prisma/schema.prisma --file apps/api/seed-demo.sql

      - name: Run tests (API + Web)
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run test:all

      - name: Build (API + Web)
        if: steps.changes.outputs.docs_only != 'true'
        run: npm run build:all
