name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.changes.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | sed '/^$/d' > changed-files.txt

          docs_only=true
          if [ ! -s changed-files.txt ]; then
            docs_only=false
          else
            while IFS= read -r file; do
              case "$file" in
                docs/*|*.md|README|README.*)
                  ;;
                *)
                  docs_only=false
                  ;;
              esac
            done < changed-files.txt
          fi

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          cat changed-files.txt

  docs-validation:
    needs: classify-changes
    if: needs.classify-changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Lightweight docs validation
        run: |
          echo "Documentation-only change detected."
          echo "Skipping dependency install, tests, build, and PostgreSQL."

  validate:
    needs: classify-changes
    if: needs.classify-changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: postgresql://menucare:menucare@localhost:5432/menucare_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: menucare
          POSTGRES_PASSWORD: menucare
          POSTGRES_DB: menucare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U menucare -d menucare_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace apps/api

      - name: Prepare test database
        run: |
          npm exec --workspace apps/api -- prisma db execute --schema prisma/schema.prisma --file prisma/migrations/baseline/migration.sql
          npm exec --workspace apps/api -- prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260611_sprint_p_contracts_status/migration.sql
          npm exec --workspace apps/api -- prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260611_sprint_p_source_excerpt/migration.sql
          npm exec --workspace apps/api -- prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260611_sprint_p_evidence_metadata/migration.sql
          npm exec --workspace apps/api -- prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260611_sprint_p_compliance_controls/migration.sql
          npm exec --workspace apps/api -- prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260611_sprint_q_control_state_machine_and_finding_events/migration.sql
          npm exec --workspace apps/api -- prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260611_sprint_q_operational_governance/migration.sql
          npm exec --workspace apps/api -- prisma db execute --schema prisma/schema.prisma --file seed-demo.sql

      - name: Run tests (API + Web)
        run: npm run test:all

      - name: Build (API + Web)
        run: npm run build:all
