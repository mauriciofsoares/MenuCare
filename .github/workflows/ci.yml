name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: menucare
          POSTGRES_PASSWORD: menucare
          POSTGRES_DB: menucare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U menucare -d menucare"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: postgresql://menucare:menucare@localhost:5432/menucare?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (API)
        run: npm exec --workspace apps/api -- prisma generate

      - name: Prisma db push (API)
        run: npm exec --workspace apps/api -- prisma db push --skip-generate

      - name: Confirm DATABASE_URL availability
        run: node -e "console.log('DATABASE_URL set:', Boolean(process.env.DATABASE_URL))"

      - name: Prisma db push before tests (API)
        run: npm exec --workspace apps/api -- prisma db push --skip-generate

      - name: Prisma validate (API)
        run: npm exec --workspace apps/api -- prisma validate

      - name: Run tests (API + Web)
        env:
          DATABASE_URL: postgresql://menucare:menucare@localhost:5432/menucare?schema=public
        run: npm run test:all

      - name: Build (API + Web)
        run: npm run build:all
